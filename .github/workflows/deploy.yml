name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ============================================================================
  # Job 1: Build & Verify Testing Suites
  # ============================================================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Compile and Run JUnit Test Suites
      run: mvn -B clean test

    - name: Package JAR Application
      run: mvn -B package -DskipTests

  # ============================================================================
  # Job 2: Audit Docker Containerization Builds
  # ============================================================================
  docker-audit:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/setup-buildx-action@v3

    - name: Validate Production Dockerfile Build Compile
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: student-management-system:latest
