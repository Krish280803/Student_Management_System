version: '3.8'

services:
  # ============================================================================
  # Service: Database Container
  # ============================================================================
  mysql-db:
    image: mysql:8.0.36
    container_name: sms-mysql-db
    environment:
      MYSQL_DATABASE: student_db
      MYSQL_USER: sms_user
      MYSQL_PASSWORD: sms_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Populate schema and seeds scripts automatically on first startup
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./src/main/resources/db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    networks:
      - sms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "sms_user", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Service: Spring Boot Application Container
  # ============================================================================
  sms-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-app-service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/student_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: sms_user
      SPRING_DATASOURCE_PASSWORD: sms_pass
      # In docker mode, Hibernate schema update is handled by mysql initdb mounting script
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - sms-network

# Network & Volumes definitions
networks:
  sms-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
