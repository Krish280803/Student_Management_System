# ===================================================================
# Local Development Fallback: In-Memory H2 Profile
# ===================================================================
spring.application.name=student-management-localh2

# H2 Database Connection URL
spring.datasource.url=jdbc:h2:mem:student_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console path configuration (accessible via /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA / Hibernate Configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

# SQL Script Initialization (seeds H2 tables automatically on bootstrap)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/seed.sql

# Logging Configurations
logging.level.org.springframework=INFO
logging.level.com.studentmanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG

spring.mvc.static-path-pattern=/**
