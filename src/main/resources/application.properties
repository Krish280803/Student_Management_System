# ===================================================================
# Application Configurations
# ===================================================================
spring.application.name=student-management
server.port=8080

# ===================================================================
# Database Configurations (MySQL)
# ===================================================================
# JDBC Connection URL (Creates database automatically if it does not exist)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:student_management_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# Database Username and Password (customizable via env variables)
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

# JDBC Driver Class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ===================================================================
# JPA / Hibernate Configurations
# ===================================================================
# Hibernate DDL-Auto (update structure on startup for development)
spring.jpa.hibernate.ddl-auto=update

# Database Platform Dialect for Spring Boot 3 / Hibernate 6
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# SQL Logging and Formatting
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# ===================================================================
# Logging Configurations
# ===================================================================
logging.level.org.springframework=INFO
logging.level.com.studentmanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Enable serving static index.html or welcome pages
spring.mvc.static-path-pattern=/**
