# ===================================================================
# Test Configurations (In-Memory Database)
# ===================================================================
spring.application.name=student-management-test

# Use H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:student_test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate settings for testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Reduce log pollution during tests
logging.level.org.springframework=WARN
logging.level.com.studentmanagement=INFO
logging.level.org.hibernate.SQL=WARN
